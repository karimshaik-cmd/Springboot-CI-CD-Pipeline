---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: springboot-api
spec:
  system: Banking Connect-system
  type: url
  targets:
    - https://raw.githubusercontent.com/karimshaik-cmd/Springboot-CI-CD-Pipeline/main/api.yaml
    - https://raw.githubusercontent.com/karimshaik-cmd/Springboot-CI-CD-Pipeline/main/groups.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: Gateway
  description: PU CI/CD pipeline with Jenkins
  annotations:
    github.com/project-slug: karimshaik-cmd/Springboot-CI-CD-Pipeline
    jenkins.io/job-full-name: springboot-pipelines
    backstage.io/techdocs-ref: dir:.
  tags:
    - spring-boot
  links:
    - url: https://github.com/karimshaik-cmd
      title: GitHub Profile
      icon: github

    - url: http://localhost:9090/job/springboot-pipeline/
      title: Jenkins Pipeline
      icon: dashboard

spec:
  system: Banking Connect-system
  type: service
  lifecycle: production
  owner: group:dev-team
  providesApis:
    - nbbl-gateway-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: Banking Connect-system
  description: Banking Connect service
  annotations:
    github.com/project-slug: karimshaik-cmd/fintech
    jenkins.io/job-full-name: fintech-dashboard
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  system: Banking Connect-system
  lifecycle: production
  owner: group:qa-team
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: Banking Connect-system
  description: Banking Connect-system
spec:
  system: Banking Connect-system
  owner: group:ops-team
